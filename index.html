<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony and Ryo | トニーとりょうすけ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 300px;
            margin: 0 auto;
        }
        .links a {
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .links a:hover {
            background: rgba(255,255,255,0.2);
        }
        .youtube { background: #ff0000 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tony and Ryo</h1>
        <p class="subtitle">トニーとりょうすけ</p>
        <div class="links">
            <a href="https://www.youtube.com/@TonyandRyosuke" class="youtube">📺 YouTube</a>
            <a href="https://x.com/RyosukeMura1">𝕏 Ryosuke on X</a>
        </div>
    </div>
</body>
</html>
